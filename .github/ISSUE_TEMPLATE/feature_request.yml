name: Feature Request
description: Propose a product, workflow, design, or engineering improvement.
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent workflow is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: user
    attributes:
      label: Primary User
      options:
        - Human researcher/creator
        - Codex/Claude/Gemini agent
        - OSS contributor
        - Local operator
        - Future hosted/team user
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: v0.1 Boundaries
      options:
        - label: This does not require destructive MCP tools.
        - label: This does not require external posting, social scraping, payments, or account mutation.
        - label: This can work without live model provider keys.
        - label: This preserves local-first runtime data by default.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - User can ...
        - Tests cover ...
        - Docs update ...
    validations:
      required: true

