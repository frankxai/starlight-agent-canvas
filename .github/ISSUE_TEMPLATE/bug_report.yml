name: Bug Report
description: Report a reproducible product, install, MCP, or workflow bug.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Starlight Agent Canvas. Please redact private canvas content, secrets, and local paths that should not be public.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web canvas
        - Source ingestion
        - MCP server
        - Install/setup
        - Export/import
        - Tests/CI
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List exact steps, commands, pasted source type, or MCP calls.
      placeholder: |
        1. Run ...
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, browser, MCP client, and relevant env var names only.
      placeholder: |
        OS:
        Node:
        pnpm:
        Browser:
        MCP client:
        AGENT_CANVAS_HOME set? yes/no
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste redacted logs or attach screenshots. Do not include secrets.

