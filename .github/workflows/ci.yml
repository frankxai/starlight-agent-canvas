name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Cost gate: skip on draft PRs — agents iterate free; full suite runs on
    # ready_for_review and on every push to main.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Full cross-version matrix on main (safety net before/after merge).
      # PRs run the primary version only — same checks, half the compute;
      # the second version still gets validated before landing on main.
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('["22.13.0","24"]') || fromJSON('["24"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm mcp:build
      - run: pnpm doctor
      - run: pnpm doctor:json
      - run: pnpm first-success:json
      - run: pnpm adoption:report:json
      - run: pnpm release:audit
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm canvas:smoke
      - run: pnpm mcp:smoke
      - run: pnpm mcp:codex:smoke
      - run: pnpm build
      - run: pnpm first-run:check -- --skip-build
      - run: pnpm --filter @starlight-agent-canvas/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
