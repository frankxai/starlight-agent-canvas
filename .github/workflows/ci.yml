name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.13.0, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm mcp:build
      - run: pnpm doctor
      - run: pnpm doctor:json
      - run: pnpm first-success:json
      - run: pnpm adoption:report:json
      - run: pnpm release:audit
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm canvas:smoke
      - run: pnpm mcp:smoke
      - run: pnpm build
      - run: pnpm first-run:check -- --skip-build
      - run: pnpm --filter @starlight-agent-canvas/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
